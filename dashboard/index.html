<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carrier Sales Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Carrier Sales Metrics</h1>
    <div>
        <p>Total Calls: <span id="total-calls">0</span></p>
        <p>Success Rate: <span id="success-rate">0%</span></p>
        <p>Average Negotiated Price: $<span id="avg-price">0</span></p>
    </div>
    <canvas id="sentimentChart" width="400" height="200"></canvas>
    <canvas id="outcomeChart" width="400" height="200"></canvas>

    <script>
        const apiKey = 'cdc33e44d693a3a58451898d4ec9df862c65b954'; // In prod, use env
        const apiUrl = '/api/metrics'; // Adjust for deployed

        async function fetchMetrics() {
            const response = await fetch(apiUrl, {
                headers: { 'X-API-Key': apiKey }
            });
            const data = await response.json();
            document.getElementById('total-calls').textContent = data.total_calls;
            document.getElementById('success-rate').textContent = (data.success_rate * 100).toFixed(2) + '%';
            document.getElementById('avg-price').textContent = data.avg_negotiated_price.toFixed(2);

            // Sentiment chart
            const sentimentCtx = document.getElementById('sentimentChart').getContext('2d');
            new Chart(sentimentCtx, {
                type: 'pie',
                data: {
                    labels: Object.keys(data.sentiment),
                    datasets: [{
                        data: Object.values(data.sentiment),
                        backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe']
                    }]
                }
            });

            // Outcome chart
            const outcomeCtx = document.getElementById('outcomeChart').getContext('2d');
            new Chart(outcomeCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data.outcomes),
                    datasets: [{
                        label: 'Outcomes',
                        data: Object.values(data.outcomes),
                        backgroundColor: '#4bc0c0'
                    }]
                }
            });
        }

        fetchMetrics();
    </script>
</body>
</html>
