app = "happyrobot-api"
primary_region = "iad"

[build]
  dockerfile = "docker/Dockerfile.api"

[env]
  FMCSA_DEMO_MODE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "happyrobot_data"
  destination = "/app/instance"
